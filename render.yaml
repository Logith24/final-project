# Render Blueprint (optional): New → Blueprint → connect repo → select this file.
# IMPORTANT: If you created the service manually, the Build Command in the UI
# must NOT be "npm build" (invalid). Use: npm install   OR   npm run build
#
# Set MONGODB_URI and FRONTEND_URL in the Render dashboard (mark as secret).

services:
  - type: web
    name: book-library-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
